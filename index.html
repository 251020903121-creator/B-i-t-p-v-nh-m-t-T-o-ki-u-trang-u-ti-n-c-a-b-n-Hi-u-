<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Tổng Hợp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- YÊU CẦU 1: Liên kết bỏ qua nội dung (Sẽ ẩn đi, chỉ hiện khi nhấn Tab) -->
    <a href="#main-content" class="skip-link">Chuyển đến nội dung chính</a>

    <header>
        <h1>Khám Phá Di Sản Việt Nam</h1>
        <!-- YÊU CẦU 2: Thanh điều hướng hấp dẫn, dễ truy cập -->
        <nav aria-label="Menu chính">
            <ul class="nav-links">
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Bộ sưu tập</a></li>
                <li><a href="#">Thông tin</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <!-- YÊU CẦU 3: Sử dụng Grid và Flex cho bố cục -->
        <section class="grid-layout">
            <div class="card">
                <img src="https://picsum.photos/300/200" alt="Hình ảnh minh họa 1">
                <h3>Địa danh 1</h3>
                <p>Mô tả ngắn gọn về địa danh thứ nhất.</p>
            </div>
            <div class="card">
                <img src="https://picsum.photos/300/200" alt="Hình ảnh minh họa 2">
                <h3>Địa danh 2</h3>
                <p>Mô tả ngắn gọn về địa danh thứ hai.</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Khu Di Tích Lịch Sử. Tất cả các quyền được bảo lưu.</p>
    </footer>

</body>
</html>
